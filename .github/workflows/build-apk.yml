name: Build APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          mkdir -p ${{ runner.temp }}/android-sdk/cmdline-tools
          cd ${{ runner.temp }}/android-sdk/cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
          unzip -qo tools.zip
          yes | ./cmdline-tools/bin/sdkmanager --sdk_root=${{ runner.temp }}/android-sdk "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -1
          echo "ANDROID_HOME=${{ runner.temp }}/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${{ runner.temp }}/android-sdk" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create local.properties
        run: echo "sdk.dir=${{ runner.temp }}/android-sdk" > android/local.properties

      - name: Build APK
        run: cd android && gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dashtivi-plus
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
