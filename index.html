<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // One-time force update — remove after all users are on new SW (v9+)
      if ('serviceWorker' in navigator && !sessionStorage.getItem('sw_purged_v2')) {
        sessionStorage.setItem('sw_purged_v2', '1');
        caches.keys().then(function(k) { k.forEach(function(c) { caches.delete(c); }); });
        navigator.serviceWorker.getRegistrations().then(function(r) {
          r.forEach(function(w) { w.unregister(); });
          if (r.length) setTimeout(function() { location.reload(); }, 300);
        });
      }
    </script>
