<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gamingTextGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9500"/>
      <stop offset="50%" style="stop-color:#FF7900"/>
      <stop offset="100%" style="stop-color:#E06600"/>
    </linearGradient>
    <filter id="gamingGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0a0a1a"/>

  <!-- Subtle background glow -->
  <ellipse cx="256" cy="256" rx="200" ry="150" fill="#FF7900" opacity="0.1"/>

  <!-- GAMES Text -->
  <text x="256" y="270"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="110"
        font-weight="800"
        fill="url(#gamingTextGrad)"
        text-anchor="middle"
        filter="url(#gamingGlow)">GAMES</text>

  <!-- PLAY subtitle -->
  <text x="256" y="320"
        font-family="system-ui, sans-serif"
        font-size="28"
        font-weight="400"
        fill="#555"
        letter-spacing="10"
        text-anchor="middle">PLAY</text>
</svg>
