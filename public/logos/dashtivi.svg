<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tiviTextGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9D4EDD"/>
      <stop offset="50%" style="stop-color:#7B2CBF"/>
      <stop offset="100%" style="stop-color:#5A189A"/>
    </linearGradient>
    <filter id="tiviGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0a0a1a"/>

  <!-- Subtle background glow -->
  <ellipse cx="256" cy="256" rx="200" ry="150" fill="#9D4EDD" opacity="0.15"/>

  <!-- TIVI Text -->
  <text x="256" y="250"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="130"
        font-weight="800"
        fill="url(#tiviTextGrad)"
        text-anchor="middle"
        filter="url(#tiviGlow)">TIVI</text>

  <!-- + symbol -->
  <text x="380" y="200"
        font-family="system-ui, sans-serif"
        font-size="60"
        font-weight="700"
        fill="#E040FB"
        text-anchor="middle">+</text>

  <!-- STREAMING subtitle -->
  <text x="256" y="320"
        font-family="system-ui, sans-serif"
        font-size="28"
        font-weight="400"
        fill="#555"
        letter-spacing="10"
        text-anchor="middle">STREAMING</text>
</svg>
